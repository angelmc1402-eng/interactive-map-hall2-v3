<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HALL 2 - Precision Magnifier Map Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
    :root {
        --verde-base: #2ecc71;
        --verde-deep: #27ae60;
        --rojo-sold: #e74c3c;
        --text-gray: #95a5a6;
        --fuente: 'Inter', sans-serif;
        --tooltip-scale: 1; 
    }

    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #e5e7eb; font-family: var(--fuente); }
    
    #map-wrapper { 
        width: 100vw; height: 100vh; 
        display: flex; justify-content: center; align-items: center; 
        position: relative; overflow: hidden;
    }

    #container { 
        position: relative; 
        width: 100%; max-width: 1600px; 
        transform-origin: center center; 
        transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1); 
        cursor: crosshair; 
        touch-action: none; 
    }

    #map-img { width: 100%; height: auto; display: block; user-select: none; -webkit-user-drag: none; }

    /* ESTADOS DE CURSOR Y COMPORTAMIENTO SEGÚN ZOOM */
    /* En Nivel 1 y 2, permitimos arrastrar (pan) */
    body.is-state-1 #container, body.is-state-2 #container { cursor: grab; }
    body.is-state-1 #container:active, body.is-state-2 #container:active { cursor: grabbing; }

    /* --- MESAS (Estilos afinados) --- */
    .mesa { 
        position: absolute; border: 1px solid var(--verde-base); 
        background: rgba(46, 204, 113, 0.25); box-sizing: border-box; 
        border-radius: 1px; pointer-events: none; 
    }
    
    /* Activar interacciones SÓLO en Nivel 1 y 2 */
    body.is-state-1 .mesa, body.is-state-2 .mesa { pointer-events: auto; cursor: pointer; }
    
    .mesa.commercial { border-color: #3498db; background: rgba(52, 152, 219, 0.25); }
    .mesa.agotada { background: rgba(231, 76, 60, 0.4) !important; border-color: var(--rojo-sold) !important; cursor: not-allowed; }

    /* Hovers en PC */
    body.is-state-1 .mesa:hover, body.is-state-1 .mesa:active,
    body.is-state-2 .mesa:hover, body.is-state-2 .mesa:active { 
        z-index: 999; border-color: white; border-width: 1.5px;
        box-shadow: 0 0 8px rgba(0,0,0,0.3); background: rgba(46, 204, 113, 0.6);
    }
    body.is-state-1 .mesa.commercial:hover, body.is-state-2 .mesa.commercial:hover { background: rgba(52, 152, 219, 0.6); }

    /* --- TOOLTIPS --- */
    .custom-tooltip-wrapper {
        position: absolute; bottom: 150%; left: 50%;
        transform: translateX(-50%) translateY(10px) scale(var(--tooltip-scale));
        transform-origin: bottom center;
        width: 320px; background: white; border-radius: 12px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        opacity: 0; pointer-events: none; transition: all 0.2s ease;
        overflow: hidden; display: flex; flex-direction: column;
        z-index: 1000; 
    }

    body.is-state-1 .mesa:hover .custom-tooltip-wrapper, body.is-state-1 .mesa:active .custom-tooltip-wrapper,
    body.is-state-2 .mesa:hover .custom-tooltip-wrapper, body.is-state-2 .mesa:active .custom-tooltip-wrapper { 
        opacity: 1; transform: translateX(-50%) translateY(0) scale(var(--tooltip-scale)); pointer-events: auto;
    }

    .tooltip-row { display: flex; border-bottom: 1px solid #edf2f7; }
    .tooltip-cell { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; align-items: center; }
    .tooltip-cell:first-child { border-right: 1px solid #edf2f7; }
    .tooltip-label { color: var(--text-gray); font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
    .tooltip-value { font-size: 18px; font-weight: 800; color: #1f2937; text-align: center;}
    
    .tooltip-footer { padding: 12px; font-size: 14px; font-weight: 800; color: white; background: var(--verde-deep); text-align: center; }
    .mesa.agotada .tooltip-footer { background: var(--rojo-sold); }
    .mesa.commercial .tooltip-footer { background: #3498db; }

    /* --- MENÚ LATERAL (VOLVER) --- */
    #side-menu {
        position: fixed; right: -150px; top: 50%; transform: translateY(-50%);
        transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20000;
        display: flex; flex-direction: column; gap: 10px;
    }
    #side-menu.visible { right: 20px; }

    .btn-back {
        background: white; border: none; padding: 15px 25px; border-radius: 50px;
        font-family: var(--fuente); font-weight: 800; font-size: 14px; color: #1f2937;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15); cursor: pointer;
        display: flex; align-items: center; gap: 8px; transition: all 0.2s;
    }
    .btn-back:hover { transform: scale(1.05); background: #f8fafc; color: var(--rojo-sold); }

    /* ========================================= */
    /* LA LUPA MÁGICA DE GRAN ANGULAR V2 (Más grande, menos zoom) */
    /* ========================================= */
    #loupe {
        position: fixed;
        width: 350px; height: 350px; /* V2: Diámetro aumentado de 250 a 350 */
        border-radius: 50%;
        border: 4px solid white;
        box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 15px rgba(0,0,0,0.2);
        pointer-events: none;
        overflow: hidden;
        z-index: 15000; 
        opacity: 0;
        transition: opacity 0.2s, width 0.3s, height 0.3s;
        background: #fff;
        display: none;
        will-change: left, top; /* Optimización movimiento lupa */
    }
    #loupe.visible { opacity: 1; display: block; }
    
    #loupe-inner {
        position: absolute;
        transform-origin: 0 0;
        pointer-events: none;
        will-change: transform;
    }
    #loupe .custom-tooltip-wrapper { display: none !important; } /* Ocultar tooltips dentro lupa */

    @media(max-width: 768px) {
        #side-menu.visible { right: 50%; transform: translate(50%, 0); top: auto; bottom: 30px; }
        .custom-tooltip-wrapper { width: 260px; }
        #loupe { display: none !important; } /* Lupa desactivada móvil */
    }
</style>
</head>
<body class="is-state-0"> <div id="map-wrapper">
        <div id="container">
            <img id="map-img" src="Hall 2.png" alt="Map Hall 2">
            <div id="capa-mesas"></div> 
        </div>
    </div>

    <div id="loupe">
        <div id="loupe-inner"></div>
    </div>

    <div id="side-menu">
        <button class="btn-back" onclick="resetZoom()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            VOLVER
        </button>
    </div>

<script>
    const diccionarioMesas = new Map();
    const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSuA_zpd7Ays5Xt9MDPQzkzCbxj8s0SaDgQGhuxcthtMl59F3H9oWipgKfsUmbiDloop2b43rqoq8CG/pub?gid=0&single=true&output=csv';

    async function cargarMesas() {
        try {
            const respHTML = await fetch('mesas.html?v=' + new Date().getTime());
            const html = await respHTML.text();
            document.getElementById('capa-mesas').innerHTML = html;
            
            const mesas = document.querySelectorAll('.mesa');
            mesas.forEach(m => {
                const info = m.getAttribute('data-info') || ""; 
                diccionarioMesas.set(info, m); 

                const parts = info.split('-');
                let tableNum = parts.length >= 3 ? parts[2] : (parts[1] || "0"); 
                let displaySection = "";

                if (info.includes("MANGACOM")) displaySection = "Manga & Comic - Zone " + parts[1];
                else if (info.includes("FIGURES")) displaySection = "Figures & Dolls - Zone " + parts[1];
                else if (info.includes("RETRO")) { displaySection = "Retro & Fashion"; tableNum = parts[1]; }
                else displaySection = "Diecast - Zone " + parts[1];

                let type = "Collector Table";
                let price = "100,00 €";

                if (/DIECAST-(G|H)/.test(info) || /FIGURES-(C|D)/.test(info)) {
                    type = "Commercial Table";
                    price = "250,00 €";
                    m.classList.add('commercial'); 
                }

                let footerText = `${type}  •  ${price}`;

                m.innerHTML = `
                    <div class="custom-tooltip-wrapper">
                        <div class="tooltip-row">
                            <div class="tooltip-cell"><span class="tooltip-label">Section</span><span class="tooltip-value">${displaySection}</span></div>
                            <div class="tooltip-cell"><span class="tooltip-label">Table</span><span class="tooltip-value">${tableNum}</span></div>
                        </div>
                        <div class="tooltip-footer">${footerText}</div>
                    </div>`;
            });
            
            await sincronizarConExcel();
            syncLoupeContent();

        } catch (e) { console.error("Error cargando mesas:", e); }
    }

    async function sincronizarConExcel() {
        try {
            const urlFinal = URL_CSV + '&cache_ignore=' + Date.now();
            const respuesta = await fetch(urlFinal, { method: 'GET', mode: 'cors', cache: 'no-cache' });
            const filas = (await respuesta.text()).split(/\r?\n/);

            filas.forEach((fila, index) => {
                if (index === 0 || !fila.trim()) return;
                const col = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (col.length >= 3) {
                    const estado = col[1].replace(/["']/g, "").trim().toUpperCase(); 
                    const idMesa = col[2].replace(/["']/g, "").trim(); 
                    const mesaDiv = diccionarioMesas.get(idMesa);
                    
                    if (mesaDiv) {
                        if (estado.includes("VENDIDA") || estado.includes("SOLD")) {
                            mesaDiv.classList.add('agotada');
                            mesaDiv.querySelector('.tooltip-footer').innerText = "SOLD OUT";
                        } else {
                            mesaDiv.classList.remove('agotada');
                        }
                    }
                }
            });
            syncLoupeContent();
        } catch (err) { console.error("Error sincronizando:", err); }
    }

    // ==========================================
    // LA LUPA MÁGICA DE GRAN ANGULAR LOGIC
    // ==========================================
    const loupe = document.getElementById('loupe');
    const loupeInner = document.getElementById('loupe-inner');
    const loupeSize = 350; // V2: Aumentado
    const loupeZoom = 1.8; // V2: Reducido para mayor amplitud y nitidez

    function syncLoupeContent() {
        loupeInner.innerHTML = document.getElementById('container').innerHTML;
    }

    // EVENTO MOVIMIENTO RATÓN (SÓLO PC Y NO MEGA-ZOOM)
    window.addEventListener('pointermove', (e) => {
        // Desactivar lupa si: es móvil, estamos mega-zoomeados (Nivel 2), o estamos arrastrando
        if (window.innerWidth < 768 || e.pointerType === 'touch' || currentZoomState === 2 || isDragging) {
            loupe.classList.remove('visible');
            return;
        }

        const rectMainWrapper = document.getElementById('map-wrapper').getBoundingClientRect();
        const mapImgRect = document.getElementById('map-img').getBoundingClientRect(); // visible transformed rect
        
        // Si el ratón sale del recuadro visible de la imagen del mapa, ocultar
        if (e.clientX < mapImgRect.left || e.clientX > mapImgRect.right || e.clientY < mapImgRect.top || e.clientY > mapImgRect.bottom) {
            loupe.classList.remove('visible');
            return;
        }

        loupe.classList.add('visible');

        // Posicionar el círculo de la lupa centrado en el cursor (con corrección de scroll)
        const mouseXInWrapper = e.clientX - rectMainWrapper.left;
        const mouseYInWrapper = e.clientY - rectMainWrapper.top;

        // Usamos translates simples para posicionar la lupa para mejor rendimiento
        loupe.style.transform = `translate(${mouseXInWrapper - loupeSize/2}px, ${mouseYInWrapper - loupeSize/2}px)`;
        
        // IMPORTANTE: Resetear left/top que usábamos antes si cambiamos a transform
        loupe.style.left = '0px'; loupe.style.top = '0px';

        // MATEMÁTICAS LUPA (Independiente del zoom actual del mapa)
        
        // 1. Obtener coordenadas del ratón RELATIVAS a la imagen del mapa visible actual (pannada/zoomeada)
        const relX = e.clientX - mapImgRect.left;
        const relY = e.clientY - mapImgRect.top;

        // 2. Convertir esas coordenadas visibles a coordenadas naturales de la imagen original (0..5000px, etc)
        // Natural = Relativa / DimensionVisible * DimensionNatural
        const naturalX = (relX / mapImgRect.width) * mapImg.naturalWidth;
        const naturalY = (relY / mapImgRect.height) * mapImg.naturalHeight;
        
        // 3. Transformar contenido lupa interna:
        // Primero forzar tamaño natural, luego centrar contenido en lupa(350/2) y aplicar aumento.
        loupeInner.style.width = mapImg.naturalWidth + 'px';
        loupeInner.style.height = mapImg.naturalHeight + 'px';

        const loupeCenterX = loupeSize / 2;
        const loupeCenterY = loupeSize / 2;

        // Matemática: Centrar -> Escalar -> Trasladar punto natural al centro
        loupeInner.style.transform = `translate(${loupeCenterX}px, ${loupeCenterY}px) scale(${loupeZoom}) translate(${-naturalX}px, ${-naturalY}px)`;
    });


    // ==========================================
    // MOTOR DE ZOOM DE TRIPLE NIVEL Y PAN (ARRASTRAR)
    // ==========================================
    const container = document.getElementById('container');
    const sideMenu = document.getElementById('side-menu');
    let isZoomed = false; // Se mantiene por compatibilidad grab, pero usamos State
    let currentZoomState = 0; // 0=full, 1=zoom1, 2=megaZoom2
    let currentZoom = 1;
    let isDragging = false;
    let startX, startY, currentX = 0, currentY = 0;

    // GESTIÓN CLICKS PARA TRIPLE NIVEL ZOOM
    container.addEventListener('click', (e) => {
        if (isDragging) return; // ignore si fue fin de arrastre

        const rectVisMapa = container.getBoundingClientRect(); // Visible transformed rect

        // Coordenadas visible donde se hizo click RELATIVAS al contenedor pannado
        // Esto funciona bien incluso pannado porque Origin setting re-centra visible part.
        const xP_vis = ((e.clientX - rectVisMapa.left) / rectVisMapa.width) * 100;
        const yP_vis = ((e.clientY - rectVisMapa.top) / rectVisMapa.height) * 100;

        loupe.classList.remove('visible'); // Ocultar lupa al pulsar

        if (currentZoomState === 0) {
            // FULL -> ACERCAMIENTO PASILLO (Nivel 1)
            currentZoom = window.innerWidth < 768 ? 4.5 : 2.5; // Móvil necesita más
            
            // Re-centrar visible part on click point
            container.style.transformOrigin = `${xP_vis}% ${yP_vis}%`;
            container.style.transform = `scale(${currentZoom}) translate(0px, 0px)`;
            
            // Tooltip scale fix
            document.documentElement.style.setProperty('--tooltip-scale', 1 / currentZoom);
            
            document.body.className = 'is-state-1';
            currentZoomState = 1;
            sideMenu.classList.add('visible');
            currentX = 0; currentY = 0; // Reset pans

        } else if (currentZoomState === 1) {
            // PASILLO -> MEGA ZOOM PRECISIÓN (Nivel 2)
            currentZoom = 6.0; // Aumento masivo definitivo
            
            // Re-centrar visible part de nuevo on new click point
            container.style.transformOrigin = `${xP_vis}% ${yP_vis}%`;
            container.style.transform = `scale(${currentZoom}) translate(0px, 0px)`;
            
            // Tooltip scale fix definitivo
            document.documentElement.style.setProperty('--tooltip-scale', 1 / currentZoom);
            
            document.body.className = 'is-state-2';
            currentZoomState = 2;
            currentX = 0; currentY = 0; // Reset pans

        } else if (currentZoomState === 2) {
            // MEGA ZOOM -> RESETEAR A FULL (Bucle)
            resetZoom();
        }
    });

    // BOTÓN VOLVER (Siempre resetea a 0)
    window.resetZoom = function() {
        container.style.transform = `scale(1) translate(0px, 0px)`;
        container.style.transformOrigin = `center center`;
        document.body.className = 'is-state-0';
        sideMenu.classList.remove('visible');
        currentZoomState = 0; currentZoom = 1;
        
        document.querySelectorAll('.custom-tooltip-wrapper').forEach(t => {
            t.style.opacity = '0'; t.style.pointerEvents = 'none';
            setTimeout(() => { t.style.opacity = ''; t.style.pointerEvents = ''; }, 300);
        });
    };

    // LÓGICA ARRASTRE (PANNABLE) - SÓLO ACTIVA EN STATE 1 Y 2
    function startDrag(clientX, clientY) {
        if (currentZoomState === 0) return; // No arrastrar si mapa completo
        isDragging = true;
        startX = clientX - currentX;
        startY = clientY - currentY;
        container.style.transition = 'none'; 
    }

    function doDrag(clientX, clientY) {
        if (!isDragging) return;
        currentX = clientX - startX;
        currentY = clientY - startY;
        // Dividimos traslación por zoom actual para que el mapa siga al puntero exactamente
        container.style.transform = `scale(${currentZoom}) translate(${currentX / currentZoom}px, ${currentY / currentZoom}px)`;
    }

    function endDrag() {
        if (!isDragging) return;
        setTimeout(() => isDragging = false, 50); 
        container.style.transition = 'transform 0.4s cubic-bezier(0.22, 1, 0.36, 1)'; 
    }

    // Eventos Ratón
    container.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
    window.addEventListener('mousemove', (e) => doDrag(e.clientX, e.clientY));
    window.addEventListener('mouseup', endDrag);

    // Eventos Táctiles (Móviles - Solo Zoom Directo, sin arrastre pasillo por simplificar bugs)
    container.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX, e.touches[0].clientY));
    window.addEventListener('touchmove', (e) => {
        if (currentZoomState > 0) e.preventDefault(); // Evitar scroll web si zoomeado
        doDrag(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    window.addEventListener('touchend', endDrag);

    // ==========================================
    // INICIALIZACIÓN
    // ==========================================
    window.onload = cargarMesas;
    setInterval(sincronizarConExcel, 120000); 

</script>
</body>
</html>
