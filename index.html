<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HALL 2 - Ultimate Precision Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
    :root {
        --verde-base: #2ecc71;
        --verde-deep: #27ae60;
        --rojo-sold: #e74c3c;
        --text-gray: #95a5a6;
        --fuente: 'Inter', sans-serif;
        --tooltip-scale: 1; 
        --map-zoom: 1; /* NUEVO: Variable dinámica para evitar que los bordes engorden */
    }

    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #e5e7eb; font-family: var(--fuente); }
    
    #map-wrapper { 
        width: 100vw; height: 100vh; 
        position: relative; overflow: hidden;
    }

    #container { 
        position: absolute; 
        top: 0; left: 0;
        width: 100vw; 
        transform-origin: 0 0; 
        transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
        cursor: crosshair; 
        touch-action: none; 
    }

    #map-img { width: 100%; height: auto; display: block; user-select: none; -webkit-user-drag: none; }

    body.is-state-1 #container, body.is-state-2 #container { cursor: grab; }
    body.is-state-1 #container:active, body.is-state-2 #container:active { cursor: grabbing; }

    /* --- MESAS (BORDES INTELIGENTES ANTI-DISTORSIÓN) --- */
    .mesa { 
        position: absolute; 
        /* Dividimos el grosor entre el zoom actual para que siempre se vea de 1.5px visuales */
        border: calc(1.5px / var(--map-zoom)) solid var(--verde-base); 
        background: rgba(46, 204, 113, 0.25); 
        box-sizing: border-box; 
        /* Dividimos el radio para que no queden como pastillas redondas al acercarse */
        border-radius: calc(2px / var(--map-zoom)); 
        pointer-events: none; 
    }
    
    body.is-state-1 .mesa, body.is-state-2 .mesa { pointer-events: auto; cursor: pointer; }
    
    .mesa.commercial { border-color: #3498db; background: rgba(52, 152, 219, 0.25); }
    .mesa.agotada { background: rgba(231, 76, 60, 0.4) !important; border-color: var(--rojo-sold) !important; cursor: not-allowed; }

    body.is-state-1 .mesa:hover, body.is-state-1 .mesa:active,
    body.is-state-2 .mesa:hover, body.is-state-2 .mesa:active { 
        z-index: 999; border-color: white; 
        border-width: calc(2.5px / var(--map-zoom)); /* Borde hover constante */
        box-shadow: 0 0 calc(10px / var(--map-zoom)) rgba(0,0,0,0.4); /* Sombra constante */
        background: rgba(46, 204, 113, 0.6);
    }
    body.is-state-1 .mesa.commercial:hover, body.is-state-2 .mesa.commercial:hover { background: rgba(52, 152, 219, 0.6); }

    /* --- TOOLTIPS --- */
    .custom-tooltip-wrapper {
        position: absolute; bottom: 150%; left: 50%;
        transform: translateX(-50%) translateY(10px) scale(var(--tooltip-scale));
        transform-origin: bottom center;
        width: 320px; background: white; border-radius: 12px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        opacity: 0; pointer-events: none; transition: all 0.2s ease;
        overflow: hidden; display: flex; flex-direction: column;
        z-index: 1000; 
    }

    body.is-state-1 .mesa:hover .custom-tooltip-wrapper, body.is-state-1 .mesa:active .custom-tooltip-wrapper,
    body.is-state-2 .mesa:hover .custom-tooltip-wrapper, body.is-state-2 .mesa:active .custom-tooltip-wrapper { 
        opacity: 1; transform: translateX(-50%) translateY(0) scale(var(--tooltip-scale)); pointer-events: auto;
    }

    .tooltip-row { display: flex; border-bottom: 1px solid #edf2f7; }
    .tooltip-cell { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; align-items: center; }
    .tooltip-cell:first-child { border-right: 1px solid #edf2f7; }
    .tooltip-label { color: var(--text-gray); font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
    .tooltip-value { font-size: 18px; font-weight: 800; color: #1f2937; text-align: center;}
    
    .tooltip-footer { padding: 12px; font-size: 14px; font-weight: 800; color: white; background: var(--verde-deep); text-align: center; }
    .mesa.agotada .tooltip-footer { background: var(--rojo-sold); }
    .mesa.commercial .tooltip-footer { background: #3498db; }

    /* --- SELECTOR RÁPIDO DE ZOOM (UI FLOTANTE) --- */
    #zoom-ui {
        position: fixed; bottom: 30px; right: 30px;
        background: white; padding: 6px; border-radius: 50px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 20000;
        display: flex; gap: 5px;
    }
    .zoom-btn {
        width: 45px; height: 45px; border-radius: 50%; border: none;
        background: transparent; font-weight: 800; font-family: var(--fuente); color: var(--text-gray);
        cursor: pointer; transition: all 0.2s; font-size: 14px;
    }
    .zoom-btn:hover { background: #f1f5f9; color: #1f2937; }
    .zoom-btn.active { background: #1f2937; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

    /* ========================================= */
    /* LA LUPA MÁGICA */
    /* ========================================= */
    #loupe {
        position: fixed; width: 260px; height: 260px; border-radius: 50%;
        border: 4px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 15px rgba(0,0,0,0.2);
        pointer-events: none; overflow: hidden; z-index: 15000; 
        opacity: 0; display: none; background: #fff;
        left: 0; top: 0; 
        will-change: transform;
    }
    #loupe.visible { opacity: 1; display: block; }
    
    #loupe-inner { 
        position: absolute; transform-origin: 0 0; pointer-events: none; 
        will-change: transform;
    }
    #loupe .custom-tooltip-wrapper { display: none !important; }

    @media(max-width: 768px) {
        #zoom-ui { right: 50%; transform: translateX(50%); bottom: 25px; }
        .custom-tooltip-wrapper { width: 260px; }
        #loupe { display: none !important; } 
    }
</style>
</head>
<body class="is-state-0">

    <div id="map-wrapper">
        <div id="container">
            <img id="map-img" src="Hall 2.png" alt="Map Hall 2">
            <div id="capa-mesas"></div> 
        </div>
    </div>

    <div id="loupe">
        <div id="loupe-inner"></div>
    </div>

    <div id="zoom-ui">
        <button class="zoom-btn active" onclick="setZoomStateUI(0, event)">x1</button>
        <button class="zoom-btn" onclick="setZoomStateUI(1, event)">x2</button>
        <button class="zoom-btn" onclick="setZoomStateUI(2, event)">x3</button>
    </div>

<script>
    // ==========================================
    // 1. CARGA DE DATOS (Con Precios Nuevos)
    // ==========================================
    const diccionarioMesas = new Map();
    const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSuA_zpd7Ays5Xt9MDPQzkzCbxj8s0SaDgQGhuxcthtMl59F3H9oWipgKfsUmbiDloop2b43rqoq8CG/pub?gid=0&single=true&output=csv';

    async function cargarMesas() {
        try {
            const respHTML = await fetch('mesas.html?v=' + new Date().getTime());
            const html = await respHTML.text();
            document.getElementById('capa-mesas').innerHTML = html;
            
            const mesas = document.querySelectorAll('.mesa');
            mesas.forEach(m => {
                const info = m.getAttribute('data-info') || ""; 
                diccionarioMesas.set(info, m); 

                const parts = info.split('-');
                let tableNum = parts.length >= 3 ? parts[2] : (parts[1] || "0"); 
                let displaySection = "";

                if (info.includes("MANGACOM")) displaySection = "Manga & Comic - Zone " + parts[1];
                else if (info.includes("FIGURES")) displaySection = "Figures & Dolls - Zone " + parts[1];
                else if (info.includes("RETRO")) { displaySection = "Retro & Fashion"; tableNum = parts[1]; }
                else displaySection = "Diecast - Zone " + parts[1];

                let type = "Collector Table";
                let price = "100,00 €";

                if (/DIECAST-(G|H)/.test(info) || /FIGURES-(C|D)/.test(info)) {
                    type = "Commercial Table";
                    price = "250,00 €";
                    m.classList.add('commercial'); 
                }

                m.innerHTML = `
                    <div class="custom-tooltip-wrapper">
                        <div class="tooltip-row">
                            <div class="tooltip-cell"><span class="tooltip-label">Section</span><span class="tooltip-value">${displaySection}</span></div>
                            <div class="tooltip-cell"><span class="tooltip-label">Table</span><span class="tooltip-value">${tableNum}</span></div>
                        </div>
                        <div class="tooltip-footer">${type}  •  ${price}</div>
                    </div>`;
            });
            
            await sincronizarConExcel();
            // Clonar contenido para la lupa
            document.getElementById('loupe-inner').innerHTML = document.getElementById('container').innerHTML;

        } catch (e) { console.error("Error cargando mesas:", e); }
    }

    async function sincronizarConExcel() {
        try {
            const urlFinal = URL_CSV + '&cache_ignore=' + Date.now();
            const respuesta = await fetch(urlFinal, { method: 'GET', mode: 'cors', cache: 'no-cache' });
            const filas = (await respuesta.text()).split(/\r?\n/);

            filas.forEach((fila, index) => {
                if (index === 0 || !fila.trim()) return;
                const col = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (col.length >= 3) {
                    const estado = col[1].replace(/["']/g, "").trim().toUpperCase(); 
                    const idMesa = col[2].replace(/["']/g, "").trim(); 
                    const mesaDiv = diccionarioMesas.get(idMesa);
                    
                    if (mesaDiv) {
                        if (estado.includes("VENDIDA") || estado.includes("SOLD")) {
                            mesaDiv.classList.add('agotada');
                            mesaDiv.querySelector('.tooltip-footer').innerText = "SOLD OUT";
                        } else {
                            mesaDiv.classList.remove('agotada');
                        }
                    }
                }
            });
            document.getElementById('loupe-inner').innerHTML = document.getElementById('container').innerHTML;
        } catch (err) { console.error("Error sincronizando:", err); }
    }

    // ==========================================
    // 2. MOTOR DE TRIPLE ZOOM & NAVEGACIÓN
    // ==========================================
    const container = document.getElementById('container');
    
    let currentZoomState = 0; 
    const ZOOM_LEVELS = [1, 2.5, 6.0];
    let currentZoom = ZOOM_LEVELS[0];
    
    let currentX = 0; 
    let currentY = 0;
    let isDragging = false;
    let startX, startY, initialX, initialY;

    function initMapPosition() {
        const wrapperHeight = window.innerHeight;
        const mapHeight = container.offsetHeight;
        if (mapHeight > 0 && mapHeight < wrapperHeight) {
            currentY = (wrapperHeight - mapHeight) / 2;
            container.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentZoom})`;
        }
    }
    setTimeout(initMapPosition, 300);

    function setZoomState(state, clickClientX = null, clickClientY = null) {
        currentZoomState = state;
        
        let newZoom = ZOOM_LEVELS[state];
        if (state === 1 && window.innerWidth < 768) newZoom = 4.5;

        // Comunicamos el zoom a CSS para que recalcule los bordes y no engorden
        document.documentElement.style.setProperty('--map-zoom', newZoom);

        document.querySelectorAll('.zoom-btn').forEach((btn, idx) => {
            btn.classList.toggle('active', idx === state);
        });
        document.body.className = 'is-state-' + state;

        if (state === 0) {
            // VOLVER A FULL
            currentZoom = 1;
            currentX = 0;
            currentY = Math.max(0, (window.innerHeight - container.offsetHeight) / 2);
            container.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentZoom})`;
            
            document.querySelectorAll('.custom-tooltip-wrapper').forEach(t => {
                t.style.opacity = '0'; t.style.pointerEvents = 'none';
                setTimeout(() => { t.style.opacity = ''; t.style.pointerEvents = ''; }, 300);
            });
        } else {
            // ZOOM X2 o X3
            document.documentElement.style.setProperty('--tooltip-scale', 1 / newZoom);
            
            if (clickClientX !== null && clickClientY !== null) {
                const mapUnscaledX = (clickClientX - currentX) / currentZoom;
                const mapUnscaledY = (clickClientY - currentY) / currentZoom;

                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;

                currentX = centerX - (mapUnscaledX * newZoom);
                currentY = centerY - (mapUnscaledY * newZoom);
            } else {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const mapUnscaledX = (centerX - currentX) / currentZoom;
                const mapUnscaledY = (centerY - currentY) / currentZoom;
                
                currentX = centerX - (mapUnscaledX * newZoom);
                currentY = centerY - (mapUnscaledY * newZoom);
            }
            
            currentZoom = newZoom;
            container.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentZoom})`;
        }
    }

    container.addEventListener('click', (e) => {
        if (isDragging) return; 
        document.getElementById('loupe').classList.remove('visible');

        let nextState = currentZoomState + 1;
        if (nextState > 2) nextState = 0; 

        setZoomState(nextState, e.clientX, e.clientY);
    });

    window.setZoomStateUI = function(state, event) {
        if (event) event.stopPropagation(); 
        document.getElementById('loupe').classList.remove('visible');
        setZoomState(state, null, null);
    };

    function startDrag(clientX, clientY) {
        if (currentZoomState === 0) return; 
        isDragging = true;
        startX = clientX;
        startY = clientY;
        initialX = currentX;
        initialY = currentY;
        container.style.transition = 'none'; 
    }

    function doDrag(clientX, clientY) {
        if (!isDragging) return;
        currentX = initialX + (clientX - startX);
        currentY = initialY + (clientY - startY);
        container.style.transform = `translate(${currentX}px, ${currentY}px) scale(${currentZoom})`;
    }

    function endDrag() {
        if (!isDragging) return;
        setTimeout(() => isDragging = false, 50); 
        container.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)'; 
    }

    container.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
    window.addEventListener('mousemove', (e) => doDrag(e.clientX, e.clientY));
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('mouseleave', endDrag);

    container.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX, e.touches[0].clientY));
    window.addEventListener('touchmove', (e) => {
        if (currentZoomState > 0) e.preventDefault(); 
        doDrag(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    window.addEventListener('touchend', endDrag);

    // ==========================================
    // 3. LA LUPA MÁGICA (Sólo en Nivel 0)
    // ==========================================
    const loupe = document.getElementById('loupe');
    const loupeInner = document.getElementById('loupe-inner');
    const loupeSize = 260; // Más recogida, como pediste
    const loupeZoom = 1.6; // Amplía un poco menos para ver más contexto
    
    window.addEventListener('pointermove', (e) => {
        // La lupa AHORA SOLO funciona si estamos en el nivel 0 (Vista General)
        if (window.innerWidth < 768 || e.pointerType === 'touch' || currentZoomState > 0 || isDragging) {
            loupe.classList.remove('visible');
            return;
        }

        const rect = container.getBoundingClientRect();
        
        if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) {
            loupe.classList.remove('visible');
            return;
        }

        loupe.classList.add('visible');
        loupe.style.transform = `translate(${e.clientX - loupeSize / 2}px, ${e.clientY - loupeSize / 2}px)`;

        loupeInner.style.width = container.offsetWidth + 'px';
        loupeInner.style.height = container.offsetHeight + 'px';

        const mapUnscaledX = (e.clientX - currentX) / currentZoom;
        const mapUnscaledY = (e.clientY - currentY) / currentZoom;

        const tx = (loupeSize / 2) - (mapUnscaledX * loupeZoom);
        const ty = (loupeSize / 2) - (mapUnscaledY * loupeZoom);

        loupeInner.style.transform = `translate(${tx}px, ${ty}px) scale(${loupeZoom})`;
    });

    window.onload = cargarMesas;
    setInterval(sincronizarConExcel, 120000); 

</script>
</body>
</html>
