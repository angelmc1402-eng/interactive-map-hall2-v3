<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HALL 2 - Smart Interactive Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
    :root {
        --verde-base: #2ecc71;
        --verde-deep: #27ae60;
        --rojo-sold: #e74c3c;
        --text-gray: #95a5a6;
        --fuente: 'Inter', sans-serif;
        --tooltip-scale: 1; 
    }

    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #e5e7eb; font-family: var(--fuente); }
    
    #map-wrapper { 
        width: 100vw; height: 100vh; 
        display: flex; justify-content: center; align-items: center; 
        position: relative; overflow: hidden;
    }

    /* EL MAPA (Arreglado el bug de resolución borrando will-change) */
    #container { 
        position: relative; 
        width: 100%; max-width: 1600px; 
        transform-origin: center center; 
        transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1); 
        cursor: zoom-in;
        touch-action: none; 
    }

    #map-img { width: 100%; height: auto; display: block; user-select: none; -webkit-user-drag: none; }

    .is-zoomed #container { cursor: grab; }
    .is-zoomed #container:active { cursor: grabbing; }

    /* --- MESAS --- */
    .mesa { 
        position: absolute; border: 2px solid var(--verde-base); 
        background: rgba(46, 204, 113, 0.25); box-sizing: border-box; 
        border-radius: 2px;
        pointer-events: none; /* Dormidas en vista general */
    }
    
    .is-zoomed .mesa { pointer-events: auto; cursor: pointer; }
    
    .mesa.commercial { border-color: #3498db; background: rgba(52, 152, 219, 0.25); }
    .mesa.agotada { background: rgba(231, 76, 60, 0.4) !important; border-color: var(--rojo-sold) !important; cursor: not-allowed; }

    .is-zoomed .mesa:hover, .is-zoomed .mesa:active { 
        z-index: 999; border-color: white; box-shadow: 0 0 10px rgba(0,0,0,0.3); background: rgba(46, 204, 113, 0.6);
    }

    /* --- TOOLTIPS (Sin botón abajo) --- */
    .custom-tooltip-wrapper {
        position: absolute; bottom: 150%; left: 50%;
        transform: translateX(-50%) translateY(10px) scale(var(--tooltip-scale));
        transform-origin: bottom center;
        width: 320px; background: white; border-radius: 12px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        opacity: 0; pointer-events: none; transition: all 0.2s ease;
        overflow: hidden; display: flex; flex-direction: column;
        z-index: 1000; 
    }

    .is-zoomed .mesa:hover .custom-tooltip-wrapper,
    .is-zoomed .mesa:active .custom-tooltip-wrapper { 
        opacity: 1; transform: translateX(-50%) translateY(0) scale(var(--tooltip-scale)); pointer-events: auto;
    }

    .tooltip-row { display: flex; border-bottom: 1px solid #edf2f7; }
    .tooltip-cell { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; align-items: center; }
    .tooltip-cell:first-child { border-right: 1px solid #edf2f7; }
    .tooltip-label { color: var(--text-gray); font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
    .tooltip-value { font-size: 18px; font-weight: 800; color: #1f2937; text-align: center;}
    
    .tooltip-footer { padding: 12px; font-size: 14px; font-weight: 800; color: white; background: var(--verde-deep); text-align: center; }
    .mesa.agotada .tooltip-footer { background: var(--rojo-sold); }
    .mesa.commercial .tooltip-footer { background: #3498db; }

    /* --- MENÚ LATERAL (VOLVER) --- */
    #side-menu {
        position: fixed; right: -150px; top: 50%; transform: translateY(-50%);
        transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 20000;
        display: flex; flex-direction: column; gap: 10px;
    }
    #side-menu.visible { right: 20px; }

    .btn-back {
        background: white; border: none; padding: 15px 25px; border-radius: 50px;
        font-family: var(--fuente); font-weight: 800; font-size: 14px; color: #1f2937;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15); cursor: pointer;
        display: flex; align-items: center; gap: 8px; transition: all 0.2s;
    }
    .btn-back:hover { transform: scale(1.05); background: #f8fafc; color: var(--rojo-sold); }

    @media(max-width: 768px) {
        #side-menu.visible { right: 50%; transform: translate(50%, 0); top: auto; bottom: 30px; }
        .custom-tooltip-wrapper { width: 260px; }
    }
</style>
</head>
<body>

    <div id="map-wrapper">
        <div id="container">
            <img id="map-img" src="Hall 2.png" alt="Map Hall 2">
            <div id="capa-mesas"></div> 
        </div>
    </div>

    <div id="side-menu">
        <button class="btn-back" onclick="resetZoom()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            VOLVER
        </button>
    </div>

<script>
    // ==========================================
    // 1. CARGA DE DATOS Y OPTIMIZACIÓN
    // ==========================================
    const diccionarioMesas = new Map();
    const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSuA_zpd7Ays5Xt9MDPQzkzCbxj8s0SaDgQGhuxcthtMl59F3H9oWipgKfsUmbiDloop2b43rqoq8CG/pub?gid=0&single=true&output=csv';

    async function cargarMesas() {
        try {
            const respHTML = await fetch('mesas.html?v=' + new Date().getTime());
            const html = await respHTML.text();
            document.getElementById('capa-mesas').innerHTML = html;
            
            const mesas = document.querySelectorAll('.mesa');
            mesas.forEach(m => {
                const info = m.getAttribute('data-info') || ""; 
                diccionarioMesas.set(info, m); 

                const parts = info.split('-');
                let tableNum = parts.length >= 3 ? parts[2] : (parts[1] || "0"); 
                let displaySection = "";

                // NOMBRES BONITOS
                if (info.includes("MANGACOM")) displaySection = "Manga & Comic - Zone " + parts[1];
                else if (info.includes("FIGURES")) displaySection = "Figures & Dolls - Zone " + parts[1];
                else if (info.includes("RETRO")) { displaySection = "Retro & Fashion"; tableNum = parts[1]; }
                else displaySection = "Diecast - Zone " + parts[1];

                // PRECIOS Y CATEGORÍAS
                let type = "Collector Table";
                let price = "70,00 €";

                if (/DIECAST-(G|H)/.test(info) || /FIGURES-(C|D)/.test(info)) {
                    type = "Commercial Table";
                    price = "175,00 €";
                    m.classList.add('commercial'); 
                }

                let footerText = `${type}  •  ${price}`;

                // TOOLTIP LIMPIO (Sin botón de Shopify)
                m.innerHTML = `
                    <div class="custom-tooltip-wrapper">
                        <div class="tooltip-row">
                            <div class="tooltip-cell"><span class="tooltip-label">Section</span><span class="tooltip-value">${displaySection}</span></div>
                            <div class="tooltip-cell"><span class="tooltip-label">Table</span><span class="tooltip-value">${tableNum}</span></div>
                        </div>
                        <div class="tooltip-footer">${footerText}</div>
                    </div>`;
            });
            
            await sincronizarConExcel();

        } catch (e) { console.error("Error cargando mesas:", e); }
    }

    async function sincronizarConExcel() {
        try {
            const urlFinal = URL_CSV + '&cache_ignore=' + Date.now();
            const respuesta = await fetch(urlFinal, { method: 'GET', mode: 'cors', cache: 'no-cache' });
            const filas = (await respuesta.text()).split(/\r?\n/);

            filas.forEach((fila, index) => {
                if (index === 0 || !fila.trim()) return;
                const col = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (col.length >= 3) {
                    const estado = col[1].replace(/["']/g, "").trim().toUpperCase(); 
                    const idMesa = col[2].replace(/["']/g, "").trim(); 
                    const mesaDiv = diccionarioMesas.get(idMesa);
                    
                    if (mesaDiv) {
                        if (estado.includes("VENDIDA") || estado.includes("SOLD")) {
                            mesaDiv.classList.add('agotada');
                            mesaDiv.querySelector('.tooltip-footer').innerText = "SOLD OUT";
                        } else {
                            mesaDiv.classList.remove('agotada');
                        }
                    }
                }
            });
        } catch (err) { console.error("Error sincronizando:", err); }
    }

    // ==========================================
    // 2. MOTOR DE ZOOM Y PAN (ARRASTRAR)
    // ==========================================
    const container = document.getElementById('container');
    const sideMenu = document.getElementById('side-menu');
    let isZoomed = false;
    let currentZoom = 1;
    let isDragging = false;
    let startX, startY, currentX = 0, currentY = 0;

    container.addEventListener('click', (e) => {
        if (isZoomed || isDragging) return; 

        const rect = container.getBoundingClientRect();
        const xP = ((e.clientX - rect.left) / rect.width) * 100;
        const yP = ((e.clientY - rect.top) / rect.height) * 100;

        container.style.transformOrigin = `${xP}% ${yP}%`;
        
        currentZoom = window.innerWidth < 768 ? 4.5 : 2.5;
        document.documentElement.style.setProperty('--tooltip-scale', 1 / currentZoom);

        container.style.transform = `scale(${currentZoom}) translate(0px, 0px)`;
        
        document.body.classList.add('is-zoomed');
        sideMenu.classList.add('visible');
        isZoomed = true;
        currentX = 0; currentY = 0;
    });

    window.resetZoom = function() {
        container.style.transform = `scale(1) translate(0px, 0px)`;
        document.body.classList.remove('is-zoomed');
        sideMenu.classList.remove('visible');
        isZoomed = false;
        
        document.querySelectorAll('.custom-tooltip-wrapper').forEach(t => {
            t.style.opacity = '0'; t.style.pointerEvents = 'none';
            setTimeout(() => { t.style.opacity = ''; t.style.pointerEvents = ''; }, 300);
        });
    };

    function startDrag(clientX, clientY) {
        if (!isZoomed) return;
        isDragging = true;
        startX = clientX - currentX;
        startY = clientY - currentY;
        container.style.transition = 'none'; 
    }

    function doDrag(clientX, clientY) {
        if (!isDragging) return;
        currentX = clientX - startX;
        currentY = clientY - startY;
        container.style.transform = `scale(${currentZoom}) translate(${currentX / currentZoom}px, ${currentY / currentZoom}px)`;
    }

    function endDrag() {
        if (!isDragging) return;
        setTimeout(() => isDragging = false, 50); 
        container.style.transition = 'transform 0.4s cubic-bezier(0.22, 1, 0.36, 1)'; 
    }

    container.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
    window.addEventListener('mousemove', (e) => doDrag(e.clientX, e.clientY));
    window.addEventListener('mouseup', endDrag);

    container.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX, e.touches[0].clientY));
    window.addEventListener('touchmove', (e) => {
        if (isZoomed) e.preventDefault(); 
        doDrag(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    window.addEventListener('touchend', endDrag);

    window.onload = cargarMesas;
    setInterval(sincronizarConExcel, 120000); 

</script>
</body>
</html>
